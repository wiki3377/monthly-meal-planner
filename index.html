<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月間献立</title>
  <style>
    :root { color: #26352c; background: #f7f7f2; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; } body { margin: 0; } main { max-width: 1120px; margin: auto; padding: 28px 18px; }
    header, nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; } h1 { font-size: 1.8rem; margin: 0; }
    header p { color: #66756b; margin: 4px 0 0; font-size: .9rem; } nav { justify-content: center; margin: 24px 0; } nav strong { min-width: 132px; text-align: center; }
    button, input { border: 1px solid #cbd6cd; border-radius: 8px; font: inherit; padding: 9px 12px; } button { background: #2d704e; color: white; cursor: pointer; } button:hover { background: #22563c; }
    button.secondary { background: white; color: #2d704e; } .calendar { display: grid; grid-template-columns: repeat(7, minmax(120px, 1fr)); gap: 10px; }
    article { min-height: 146px; padding: 11px; background: white; border: 1px solid #e0e6df; border-radius: 10px; } h2 { font-size: 1rem; margin: 0 0 10px; } small { color: #78847b; font-weight: normal; }
    .weekdays, .calendar { display: grid; grid-template-columns: repeat(7, minmax(105px, 1fr)); gap: 10px; min-width: 805px; } .weekdays { margin-bottom: 8px; } .weekdays div { color: #627267; font-size: .82rem; font-weight: 700; text-align: center; }
    .calendar-wrap { overflow-x: auto; padding-bottom: 4px; } .empty { background: transparent; border: 0; }
    .meal { display: block; width: 100%; margin: 5px 0; padding: 7px; color: #304137; background: #eef5ee; border: 0; text-align: left; font-size: .82rem; } .meal span { color: #337653; display: inline-block; font-weight: 700; margin-right: 7px; }
    .auth { max-width: 430px; margin-top: 10vh; } .auth input { display: block; width: 100%; margin: 12px 0; } .notice { color: #a63b2d; } .hint { color: #66756b; line-height: 1.7; }
    @media (max-width: 850px) { main { padding-inline: 14px; } }
  </style>
</head>
<body>
  <main id="app"></main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase の Connect 画面にある2つの値を貼り付けます。
    const SUPABASE_URL = 'https://pdeidguheiufyxlqjgub.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_KNnbVMNxaLmbwD1cynPXNw_uBXL2qPV';
    const configured = !SUPABASE_URL.startsWith('PASTE_') && !SUPABASE_PUBLISHABLE_KEY.startsWith('PASTE_');
    const client = configured ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY) : null;
    const app = document.querySelector('#app');
    const labels = { breakfast: '朝', lunch: '昼', dinner: '夜' };
    let month = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    let plans = [];

    const dateKey = date => date.toISOString().slice(0, 10);
    const escapeHtml = text => String(text).replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[char]);
    const days = () => Array.from({ length: new Date(month.getFullYear(), month.getMonth() + 1, 0).getDate() }, (_, index) => new Date(month.getFullYear(), month.getMonth(), index + 1));

    function showSetup() {
      app.innerHTML = `<section class="auth"><h1>月間献立</h1><p class="hint">このファイルの <code>SUPABASE_URL</code> と <code>SUPABASE_PUBLISHABLE_KEY</code> に、Supabase の Connect 画面にある値を貼り付けてください。</p></section>`;
    }

    async function loadPlans() {
      const list = days();
      const { data, error } = await client.from('meal_plans').select('*').gte('meal_date', dateKey(list[0])).lte('meal_date', dateKey(list.at(-1))).order('meal_date');
      plans = data || [];
      if (error) console.error(error.message);
    }

    function render(user, notice = '') {
      const cells = days().map(date => {
        const key = dateKey(date);
        const meals = Object.entries(labels).map(([type, label]) => {
          const plan = plans.find(item => item.meal_date === key && item.meal_type === type);
          return `<button class="meal" data-date="${key}" data-type="${type}"><span>${label}</span>${plan ? escapeHtml(plan.menu_name) : '＋ 追加'}</button>`;
        }).join('');
        return `<article><h2>${date.getDate()} <small>${['日','月','火','水','木','金','土'][date.getDay()]}</small></h2>${meals}</article>`;
      }).join('');
      const firstDayOffset = (days()[0].getDay() + 6) % 7; // 月曜=0、日曜=6
      const blanks = '<div class="empty"></div>'.repeat(firstDayOffset);
      const weekdayNames = ['月', '火', '水', '木', '金', '土', '日'].map(day => `<div>${day}</div>`).join('');
      app.innerHTML = `<header><div><h1>月間献立</h1><p>${escapeHtml(user.email || '')}</p></div><button class="secondary" id="logout">ログアウト</button></header><nav><button id="previous">←</button><strong>${month.getFullYear()}年${month.getMonth() + 1}月</strong><button id="next">→</button></nav><div class="calendar-wrap"><section class="weekdays">${weekdayNames}</section><section class="calendar">${blanks}${cells}</section></div>${notice ? `<p class="notice">${escapeHtml(notice)}</p>` : ''}`;
      document.querySelector('#logout').onclick = () => client.auth.signOut();
      document.querySelector('#previous').onclick = async () => { month = new Date(month.getFullYear(), month.getMonth() - 1, 1); await refresh(user); };
      document.querySelector('#next').onclick = async () => { month = new Date(month.getFullYear(), month.getMonth() + 1, 1); await refresh(user); };
      document.querySelectorAll('.meal').forEach(button => button.onclick = () => addMeal(user, button.dataset.date, button.dataset.type));
    }

    async function refresh(user) { await loadPlans(); render(user); }
    async function addMeal(user, mealDate, mealType) {
      const current = plans.find(item => item.meal_date === mealDate && item.meal_type === mealType);
      const menuName = prompt(`${mealDate}（${labels[mealType]}）の献立`, current?.menu_name || '');
      if (!menuName || !menuName.trim()) return;
      const { error } = await client.from('meal_plans').upsert({ user_id: user.id, meal_date: mealDate, meal_type: mealType, menu_name: menuName.trim() }, { onConflict: 'user_id,meal_date,meal_type' });
      if (error) return render(user, error.message);
      await refresh(user);
    }

    function showAuth(notice = '') {
      app.innerHTML = `<section class="auth"><h1>月間献立</h1><p class="hint">ログインすれば、複数のブラウザから同じ献立を確認できます。</p><input id="email" type="email" placeholder="メールアドレス" /><input id="password" type="password" placeholder="パスワード（6文字以上）" /><div><button id="sign-in">ログイン</button> <button class="secondary" id="sign-up">新規登録</button></div>${notice ? `<p class="notice">${escapeHtml(notice)}</p>` : ''}</section>`;
      document.querySelector('#sign-in').onclick = async () => { const { error } = await client.auth.signInWithPassword({ email: email.value, password: password.value }); if (error) showAuth(error.message); };
      document.querySelector('#sign-up').onclick = async () => { const { error } = await client.auth.signUp({ email: email.value, password: password.value }); showAuth(error ? error.message : '確認メールを送信しました。メール内のリンクを開いてください。'); };
    }

    async function start() {
      if (!client) return showSetup();
      const { data } = await client.auth.getUser();
      if (data.user) await refresh(data.user); else showAuth();
      client.auth.onAuthStateChange(async (_event, session) => { if (session?.user) await refresh(session.user); else showAuth(); });
    }
    start();
  </script>
</body>
</html>
