<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>月間献立</title>
<style>
body{margin:0;background:#f7f7f2;color:#26352c;font-family:system-ui,sans-serif}main{max-width:1120px;margin:auto;padding:24px}button,input,select,textarea{font:inherit;padding:9px;border:1px solid #cbd6cd;border-radius:8px}button{background:#2d704e;color:#fff;cursor:pointer}.sub{background:#fff;color:#2d704e}header,nav{display:flex;justify-content:space-between;align-items:center;gap:10px}h1{margin:0;font-size:1.7rem}.tools{display:flex;gap:7px;flex-wrap:wrap}.wrap{overflow-x:auto}.week,.calendar{display:grid;grid-template-columns:repeat(7,minmax(105px,1fr));gap:8px;min-width:790px}.week{margin:18px 0 6px;color:#627267;text-align:center;font-weight:bold}.day{min-height:150px;padding:10px;background:#fff;border:1px solid #e0e6df;border-radius:10px}.day.selected{border:2px solid #2d704e;background:#f2faf4}.day h2{margin:0 0 8px;font-size:1rem}.date-select{padding:2px 5px;border:0;background:transparent;color:#26352c;font-weight:700}.row{display:flex;gap:4px;margin:5px 0}.meal{flex:1;text-align:left;background:#eef5ee;color:#304137;border:0}.meal b{color:#337653;margin-right:6px}.meal.free{background:#fff3df;color:#6f4a16}.meal.free b{color:#ad6a11}.delete{background:#fff0ee;color:#a33d30;border:0}.panel{max-width:620px;margin:7vh auto}.panel input,.panel select,.panel textarea{box-sizing:border-box;display:block;width:100%;margin:10px 0}.panel textarea{min-height:140px}.hint{color:#66756b;line-height:1.7}.error{color:#a63b2d}.shopping{max-width:620px;margin:30px auto;padding:22px;background:#fff;border:1px solid #e0e6df;border-radius:12px}.shopping li{padding:8px 0;border-bottom:1px solid #edf0ed}.check-row{display:flex;align-items:center;gap:10px;cursor:pointer}.checked{text-decoration:line-through;color:#89948b}@media(max-width:600px){main{padding:14px}}
</style></head><body><main id="app"></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://pdeidguheiufyxlqjgub.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_KNnbVMNxaLmbwD1cynPXNw_uBXL2qPV';
const db=SUPABASE_URL.startsWith('PASTE_')?null:window.supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);
const app=document.querySelector('#app'), labels={snack:'おやつ',lunch:'昼',dinner:'夜',night2:'夜2'};
let month=new Date(new Date().getFullYear(),new Date().getMonth(),1),plans=[],recipes=[],selectedDates=new Set(),checkedMaterials=new Set();
const ymd=d=>d.toISOString().slice(0,10), esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const monthDays=()=>Array.from({length:new Date(month.getFullYear(),month.getMonth()+1,0).getDate()},(_,i)=>new Date(month.getFullYear(),month.getMonth(),i+1));
async function reload(user){const ds=monthDays();const [a,b]=await Promise.all([db.from('meal_plans').select('*').gte('meal_date',ymd(ds[0])).lte('meal_date',ymd(ds.at(-1))).order('meal_date'),db.from('recipes').select('*').order('name')]);plans=a.data||[];recipes=b.data||[];showCalendar(user,a.error?.message||b.error?.message)}
function head(user){return `<header><div><h1>月間献立</h1><small>${esc(user.email)}</small></div><div class="tools"><button class="sub" id="new-recipe">料理を登録</button><button class="sub" id="recipe-list">登録料理</button><button class="sub" id="material-list">材料リスト</button><button class="sub" id="logout">ログアウト</button></div></header>`}
function bindHead(user){document.querySelector('#new-recipe').onclick=()=>recipeForm(user);document.querySelector('#recipe-list').onclick=()=>recipeList(user);document.querySelector('#material-list').onclick=()=>materialList(user);document.querySelector('#logout').onclick=()=>db.auth.signOut()}
function showCalendar(user,error=''){const ds=monthDays(),blank=(ds[0].getDay()+6)%7;const cards=ds.map(d=>{const date=ymd(d),active=selectedDates.has(date);const rows=Object.entries(labels).map(([type,label])=>{const p=plans.find(x=>x.meal_date===date&&x.meal_type===type);return p?`<div class="row"><button class="meal ${p.recipe_id?'':'free'}" data-date="${date}" data-type="${type}"><b>${label}</b>${esc(p.menu_name)}</button><button class="delete" data-delete="${p.id}">×</button></div>`:`<div class="row"><button class="meal" data-date="${date}" data-type="${type}"><b>${label}</b>＋ 追加</button></div>`}).join('');return `<section class="day ${active?'selected':''}"><h2><button class="date-select" data-select-date="${date}">${d.getDate()}</button> <small>${['日','月','火','水','木','金','土'][d.getDay()]}</small></h2>${rows}</section>`}).join('');app.innerHTML=head(user)+`<nav><button id="prev">←</button><strong>${month.getFullYear()}年${month.getMonth()+1}月</strong><button id="next">→</button></nav><p class="hint">日付を押して材料リストに含める日を選択します（選択中：${selectedDates.size}日）。</p><div class="wrap"><div class="week">${['月','火','水','木','金','土','日'].map(x=>`<div>${x}</div>`).join('')}</div><div class="calendar">${'<div></div>'.repeat(blank)}${cards}</div></div>${error?`<p class="error">${esc(error)}</p>`:''}`;bindHead(user);document.querySelector('#prev').onclick=()=>{month=new Date(month.getFullYear(),month.getMonth()-1,1);reload(user)};document.querySelector('#next').onclick=()=>{month=new Date(month.getFullYear(),month.getMonth()+1,1);reload(user)};document.querySelectorAll('.meal').forEach(x=>x.onclick=()=>mealForm(user,x.dataset.date,x.dataset.type));document.querySelectorAll('[data-delete]').forEach(x=>x.onclick=()=>deleteMeal(user,x.dataset.delete));document.querySelectorAll('[data-select-date]').forEach(x=>x.onclick=()=>{const date=x.dataset.selectDate;selectedDates.has(date)?selectedDates.delete(date):selectedDates.add(date);showCalendar(user)})}
function mealForm(user,date,type){const old=plans.find(x=>x.meal_date===date&&x.meal_type===type);const opts=`<option value="">登録料理を選ばない（自由入力）</option>`+recipes.map(r=>`<option value="${r.id}" ${old?.recipe_id===r.id?'selected':''}>${esc(r.name)}</option>`).join('');app.innerHTML=`<div class="panel"><h1>${date}・${labels[type]}</h1><p class="hint">登録済みの料理を選ぶか、料理名を自由に入力します。</p><label>登録料理<select id="recipe-id">${opts}</select></label><label>自由入力の料理名<input id="menu-name" value="${esc(old?.recipe_id?'':old?.menu_name||'')}" placeholder="例：残りもの"></label><button id="save">保存</button> <button class="sub" id="back">戻る</button><p id="err" class="error"></p></div>`;document.querySelector('#back').onclick=()=>reload(user);document.querySelector('#save').onclick=async()=>{const id=document.querySelector('#recipe-id').value,r=recipes.find(x=>x.id===id),name=r?r.name:document.querySelector('#menu-name').value.trim();if(!name)return document.querySelector('#err').textContent='料理を選ぶか、名前を入力してください。';const q=await db.from('meal_plans').upsert({user_id:user.id,meal_date:date,meal_type:type,menu_name:name,recipe_id:id||null},{onConflict:'user_id,meal_date,meal_type'});if(q.error)document.querySelector('#err').textContent=q.error.message;else reload(user)}}
async function deleteMeal(user,id){if(!confirm('この献立を削除しますか？'))return;const q=await db.from('meal_plans').delete().eq('id',id);reload(user);if(q.error)showCalendar(user,q.error.message)}
function recipeForm(user){app.innerHTML=`<div class="panel"><h1>料理を登録</h1><p class="hint">食材は1行に1つ、<b>食材名, 数量, 単位</b> の順で入力します。<br>例：玉ねぎ, 1, 個<br>例：しょうゆ, 2, 大さじ</p><input id="recipe-name" placeholder="料理名（例：カレー）"><textarea id="ingredients" placeholder="玉ねぎ, 1, 個\n+にんじん, 2, 本\n+豚肉, 300, g"></textarea><button id="save-recipe">登録</button> <button id="back" class="sub">戻る</button><p id="err" class="error"></p></div>`;document.querySelector('#back').onclick=()=>reload(user);document.querySelector('#save-recipe').onclick=async()=>{const name=document.querySelector('#recipe-name').value.trim();if(!name)return document.querySelector('#err').textContent='料理名を入力してください。';const q=await db.from('recipes').insert({user_id:user.id,name}).select().single();if(q.error)return document.querySelector('#err').textContent=q.error.message;const rows=document.querySelector('#ingredients').value.split('\n').map(s=>s.trim()).filter(Boolean).map(line=>{const [ingredient_name,quantity,unit]=line.split(/[,，]/).map(s=>s.trim());return{recipe_id:q.data.id,ingredient_name,quantity:quantity?Number(quantity):null,unit:unit||null}}).filter(x=>x.ingredient_name);if(rows.length){const k=await db.from('recipe_ingredients').insert(rows);if(k.error)return document.querySelector('#err').textContent=k.error.message}reload(user)}}
async function recipeList(user){if(!recipes.length){app.innerHTML=head(user)+`<section class="shopping"><h2>登録料理</h2><p>まだ料理が登録されていません。</p><button id="back" class="sub">カレンダーへ戻る</button></section>`;bindHead(user);document.querySelector('#back').onclick=()=>reload(user);return}const q=await db.from('recipe_ingredients').select('recipe_id,ingredient_name,quantity,unit').in('recipe_id',recipes.map(x=>x.id));if(q.error)return showCalendar(user,q.error.message);const cards=recipes.map(recipe=>{const list=(q.data||[]).filter(x=>x.recipe_id===recipe.id);const items=list.length?list.map(x=>`<li>${esc(x.ingredient_name)}${x.quantity!==null?'：'+x.quantity+(x.unit?esc(x.unit):''):x.unit?'：'+esc(x.unit):''}</li>`).join(''):'<li>材料が登録されていません。</li>';return `<section class="shopping"><h2>${esc(recipe.name)}</h2><ul>${items}</ul><button class="sub edit-recipe" data-recipe="${recipe.id}">編集</button></section>`}).join('');app.innerHTML=head(user)+`<div>${cards}</div><div class="shopping"><button id="back" class="sub">カレンダーへ戻る</button></div>`;bindHead(user);document.querySelectorAll('.edit-recipe').forEach(button=>button.onclick=()=>editRecipe(user,button.dataset.recipe));document.querySelector('#back').onclick=()=>reload(user)}
async function editRecipe(user,id){const recipe=recipes.find(x=>x.id===id);if(!recipe)return;const q=await db.from('recipe_ingredients').select('ingredient_name,quantity,unit').eq('recipe_id',id);if(q.error)return recipeList(user);const lines=(q.data||[]).map(x=>x.ingredient_name+', '+(x.quantity??'')+', '+(x.unit||'')).join('\n');app.innerHTML=`<div class="panel"><h1>料理を編集</h1><p class="hint">食材は1行に1つ、<b>食材名, 数量, 単位</b> の順で入力します。</p><input id="recipe-name" value="${esc(recipe.name)}"><textarea id="ingredients">${esc(lines)}</textarea><button id="save-recipe">保存</button> <button id="back" class="sub">戻る</button><p id="err" class="error"></p></div>`;document.querySelector('#back').onclick=()=>recipeList(user);document.querySelector('#save-recipe').onclick=async()=>{const name=document.querySelector('#recipe-name').value.trim();if(!name)return document.querySelector('#err').textContent='料理名を入力してください。';const rows=document.querySelector('#ingredients').value.split('\n').map(s=>s.trim()).filter(Boolean).map(line=>{const [ingredient_name,quantity,unit]=line.split(/[,，]/).map(s=>s.trim());return{recipe_id:id,ingredient_name,quantity:quantity?Number(quantity):null,unit:unit||null}}).filter(x=>x.ingredient_name);const update=await db.from('recipes').update({name}).eq('id',id);if(update.error)return document.querySelector('#err').textContent=update.error.message;const clear=await db.from('recipe_ingredients').delete().eq('recipe_id',id);if(clear.error)return document.querySelector('#err').textContent=clear.error.message;if(rows.length){const insert=await db.from('recipe_ingredients').insert(rows);if(insert.error)return document.querySelector('#err').textContent=insert.error.message}await reload(user);recipeList(user)}}
async function materialList(user){const selected=[...selectedDates].sort();if(!selected.length)return showCalendar(user,'材料リストに表示する日付を選択してください。');const q=await db.from('meal_plans').select('recipe_id').in('meal_date',selected).not('recipe_id','is',null);if(q.error)return showCalendar(user,q.error.message);const ids=[...new Set((q.data||[]).map(x=>x.recipe_id))];let rows=[];if(ids.length){const r=await db.from('recipe_ingredients').select('recipe_id,ingredient_name,quantity,unit').in('recipe_id',ids);if(r.error)return showCalendar(user,r.error.message);const byRecipe={};(r.data||[]).forEach(x=>(byRecipe[x.recipe_id]??=[]).push(x));const sum={};(q.data||[]).forEach(plan=>(byRecipe[plan.recipe_id]||[]).forEach(x=>{const id=x.ingredient_name+'__'+(x.unit||'');if(!sum[id])sum[id]={...x,quantity:0,has:false,id};if(x.quantity!==null){sum[id].quantity+=Number(x.quantity);sum[id].has=true}}));rows=Object.values(sum)}const list=rows.length?rows.map(x=>{const value=esc(x.ingredient_name)+(x.has?'：'+x.quantity+(x.unit?esc(x.unit):''):x.unit?'：'+esc(x.unit):'');const checked=checkedMaterials.has(x.id);return `<li><label class="check-row"><input type="checkbox" data-check="${esc(x.id)}" ${checked?'checked':''}><span class="${checked?'checked':''}">${value}</span></label></li>`}).join(''):'<li>選択した日に、登録料理に設定された献立はありません。</li>';app.innerHTML=head(user)+`<section class="shopping"><h2>材料リスト</h2><p>対象日：${selected.join('、')}</p><ul>${list}</ul><button id="back" class="sub">カレンダーへ戻る</button></section>`;bindHead(user);document.querySelector('#back').onclick=()=>reload(user);document.querySelectorAll('[data-check]').forEach(x=>x.onchange=()=>{x.checked?checkedMaterials.add(x.dataset.check):checkedMaterials.delete(x.dataset.check);materialList(user)})}
function auth(msg=''){app.innerHTML=`<div class="panel"><h1>月間献立</h1><input id="email" type="email" placeholder="メールアドレス"><input id="password" type="password" placeholder="パスワード（6文字以上）"><button id="login">ログイン</button> <button id="signup" class="sub">新規登録</button><p class="error">${esc(msg)}</p></div>`;document.querySelector('#login').onclick=async()=>{const r=await db.auth.signInWithPassword({email:email.value,password:password.value});if(r.error)auth(r.error.message)};document.querySelector('#signup').onclick=async()=>{const r=await db.auth.signUp({email:email.value,password:password.value});auth(r.error?r.error.message:'確認メールを送信しました。')}}
async function start(){if(!db){app.innerHTML='<div class="panel"><h1>月間献立</h1><p>Supabase の接続情報を設定してください。</p></div>';return}const r=await db.auth.getUser();if(r.data.user)reload(r.data.user);else auth();db.auth.onAuthStateChange((_,s)=>s?.user?reload(s.user):auth())}start();
</script></body></html>
